<script>
    // --- FUNÇÕES DA INTERFACE ---
    function showLevelSelector() {
        document.getElementById('level-selector-modal').classList.remove('hidden');
        document.getElementById('level-input').value = currentLevel;
        setTimeout(() => document.getElementById('level-input').focus(), 100);
    }
    
    function closeLevelSelector() {
        document.getElementById('level-selector-modal').classList.add('hidden');
    }
    
    function jumpToLevel() {
        let val = parseInt(document.getElementById('level-input').value);
        if (val >= 1 && val <= 100) {
            currentLevel = val;
            closeLevelSelector();
            loadLevel(currentLevel);
        } else {
            document.getElementById('level-input').style.borderColor = 'red';
            setTimeout(() => document.getElementById('level-input').style.borderColor = '#4b5563', 500);
        }
    }

    // --- ÁUDIO (Música do Google Drive + SFX Sintético) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let masterGain = null;
    let isMuted = true;
    let userVolume = 0.5; 
    
    // Removemos a tag crossOrigin porque o Google Drive bloqueia pedidos de segurança profundos.
    const bgmAudio = new Audio('https://drive.google.com/uc?export=download&id=138MBuh8dfKMXnnQVRrImRzoJJ0Mxi5ST');
    bgmAudio.loop = true; // Repetir infinitamente
    bgmAudio.volume = userVolume * 0.5; // Começa num volume equilibrado
    
    // Link proxy de segurança, caso o Google Drive ative bloqueio de tráfego
    const proxyUrl = 'https://corsproxy.io/?https://drive.google.com/uc?export=download&id=138MBuh8dfKMXnnQVRrImRzoJJ0Mxi5ST';

    function updateVolume(val) {
        userVolume = parseFloat(val);
        bgmAudio.volume = userVolume * 0.5; // Atualiza o volume da tua música em tempo real
    }

    function initAudio() {
        try {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            // Força a música a tocar se não estivermos no modo silêncio
            if (!isMuted && bgmAudio.paused) {
                bgmAudio.play().catch(e => console.warn("Browser bloqueou autoplay.", e));
            }
        } catch(e) { console.error("Erro no Audio", e); }
    }

    function toggleAudio() {
        initAudio();
        isMuted = !isMuted;
        const btn = document.getElementById('btn-audio');
        const slider = document.getElementById('volume-slider');
        const toast = document.getElementById('audio-toast');
        
        if (isMuted) {
            btn.innerHTML = '🔇 Som Off';
            btn.classList.replace('text-yellow-400', 'text-white/80');
            slider.classList.add('hidden');
            
            // Pausa a música externa
            bgmAudio.pause();
            
            if (masterGain && audioCtx) {
                masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            }
        } else {
            btn.innerHTML = '🔊 Som On';
            btn.classList.replace('text-white/80', 'text-yellow-400');
            slider.classList.remove('hidden');
            
            // Dá Play na tua música do Google Drive com proteção contra falhas
            let playPromise = bgmAudio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.warn("Aviso: O Google Drive recusou o link direto. Ativando servidor Proxy...", error);
                    if (bgmAudio.src !== proxyUrl) {
                        bgmAudio.src = proxyUrl;
                        bgmAudio.play().catch(e => console.error("Falha crítica ao tocar áudio.", e));
                    }
                });
            }
            
            if (masterGain && audioCtx) {
                masterGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.1);
            }
            
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3500);
            playImpactSound(80); 
        }
    }

    function playImpactSound(velocity) {
        if (isMuted || !audioCtx || !masterGain) return;
        try {
            const vol = Math.min(Math.max(velocity / 40, 0.15), 0.6) * userVolume; 
            const t = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.exponentialRampToValueAtTime(40, t + 0.1); 
            
            oscGain.gain.setValueAtTime(vol, t);
            oscGain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
            
            osc.connect(oscGain); oscGain.connect(masterGain);
            osc.start(t); osc.stop(t + 0.2);

            const bufferSize = audioCtx.sampleRate * 0.1; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass'; noiseFilter.frequency.setValueAtTime(800, t); 
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(vol * 0.8, t); 
            noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.08); 
            
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain);
            noise.start(t);
        } catch(e) {}
    }

    function playDebrisSound(amount) {
        if (isMuted || !audioCtx || !masterGain) return;
        try {
            const vol = Math.min(0.08 + (amount * 0.01), 0.4) * userVolume; 
            const sampleRate = audioCtx.sampleRate || 44100;
            const bufferSize = Math.floor(sampleRate * 0.15); 
            const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000 + Math.random() * 500; 
            
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            
            noiseSource.connect(filter); filter.connect(gainNode); gainNode.connect(masterGain);
            noiseSource.start(audioCtx.currentTime);
        } catch(e) {}
    }

    function playExplosionSound() {
        if (isMuted || !audioCtx || !masterGain) return;
        try {
            const sampleRate = audioCtx.sampleRate || 44100;
            const bufferSize = Math.floor(sampleRate * 0.6); 
            const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; 
            filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            filter.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.4); 
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.8 * userVolume, audioCtx.currentTime); 
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            
            noise.connect(filter); filter.connect(gain); gain.connect(masterGain);
            noise.start(audioCtx.currentTime);
        } catch(e) {}
    }

    // --- CONFIGURAÇÃO FÍSICA OTIMIZADA ---
    const { Engine, Render, Runner, World, Bodies, Body, Composite, Constraint, Events, Vector, Sleeping } = Matter;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 1200;
    const HEIGHT = 600;

    function resizeCanvas() {
        const scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
        canvas.style.width = `${WIDTH * scale}px`;
        canvas.style.height = `${HEIGHT * scale}px`;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const engine = Engine.create({ enableSleeping: true }); 
    engine.positionIterations = 8; // Otimizado
    engine.velocityIterations = 6; // Otimizado
    engine.gravity.y = 1.3; 
    engine.timing.timeScale = 0.85; 

    const world = engine.world;
    const runner = Runner.create({ isFixed: true });
    Runner.run(runner, engine);

    // Filtros de Colisão (Hyper-FPS: Entulho não bate em entulho)
    const CAT_DEFAULT = 0x0001;
    const CAT_INTACT = 0x0002;
    const CAT_DEBRIS = 0x0004;

    // --- VARIÁVEIS GLOBAIS ---
    let currentLevel = 1;
    const maxLevels = 100;
    let gameState = 'playing'; 
    let currentWeapon = 'pedra';
    let explosions = [];
    let shockwaves = []; 
    let firedProjectiles = []; 
    
    let lastPath = [];
    let currentPath = [];
    let isFired = false;
    let frameCount = 0;
    
    let endTimer = null;
    let winTimer = null;
    let createProjTimer = null;
    
    let currentBlockSize = 7; 
    let castleBlocks = []; 
    let totalBlocksStart = 0;
    let blocksDestroyed = 0;
    let currentGoalPercentage = 0.35; 

    let ammo = { pedra: 0, ferro: 0, bomba: 0 };

    const PALETTE = {
        'R': ['#e07a5f', '#d95b43', '#c2593f'],
        'S': ['#9c9c9c', '#a8a8a8', '#8c8c8c'],
        'D': ['#636363', '#5c5c5c', '#555555'],
        'W': ['#5c4033', '#4a3028'],
        'G': ['#1a1a1a', '#222222'],
        'M': ['#4a7c59', '#3b6347']
    };

    const WEAPONS = {
        'pedra': { radius: 12, density: 0.04, restitution: 0.2, color: '#a8a9a6', type: 'circle' },
        'ferro': { radius: 16, density: 0.09, restitution: 0.05, color: '#222', type: 'circle' },
        'bomba': { radius: 16, density: 0.05, restitution: 0.2, color: '#ef4444', type: 'circle' }
    };

    const anchor = { x: 160, y: 380 };
    let projectile = null; 
    let trackingProjectile = null; 
    let sling;
    let isCatapultDragging = false;
    let dragPosition = null;
    let ground;

    const GROUND_Y = HEIGHT - 40; 
    const MAX_DRAG = 160; 

    const BIOMES = [
        { name: 'Planícies Verdes', sky: ['#4facfe', '#00f2fe'], mountains: ['#3b5a4a', '#2b4a3c'], ground: '#1e2d24', sun: 'rgba(255,255,220,0.8)' },
        { name: 'Inverno Rigoroso', sky: ['#a1c4fd', '#c2e9fb'], mountains: ['#9baebf', '#b0c4de'], ground: '#d0dae3', sun: 'rgba(255,255,255,0.9)' },
        { name: 'Deserto Escaldante', sky: ['#ff9a44', '#fc6076'], mountains: ['#c4714b', '#a35431'], ground: '#8a4222', sun: 'rgba(255,230,150,0.8)' },
        { name: 'Pântano Tóxico', sky: ['#16222a', '#3a6073'], mountains: ['#2c3d30', '#1c2a20'], ground: '#121a14', sun: 'rgba(150,255,150,0.2)' },
        { name: 'Terras Vulcânicas', sky: ['#4b1248', '#f00000'], mountains: ['#3a1010', '#220505'], ground: '#140000', sun: 'rgba(255,100,50,0.6)' },
        { name: 'Montanhas Nevadas', sky: ['#8e9eab', '#eef2f3'], mountains: ['#6b7b8c', '#8a9ba8'], ground: '#a2b1c2', sun: 'rgba(255,255,255,0.5)' },
        { name: 'Crepúsculo Mágico', sky: ['#30142b', '#277da1'], mountains: ['#2d2136', '#1a1320'], ground: '#120d16', sun: 'rgba(200,200,255,0.7)' }
    ];

    let currentBiome = BIOMES[0];
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = WIDTH; bgCanvas.height = HEIGHT;
    const bgCtx = bgCanvas.getContext('2d');

    function preRenderBackground(level) {
        const biomeIdx = Math.floor((level - 1) / 10) % BIOMES.length;
        currentBiome = BIOMES[biomeIdx];
        
        document.getElementById('biome-name').innerText = currentBiome.name;
        
        let grad = bgCtx.createLinearGradient(0, 0, 0, HEIGHT);
        grad.addColorStop(0, currentBiome.sky[0]);
        grad.addColorStop(1, currentBiome.sky[1]);
        bgCtx.fillStyle = grad;
        bgCtx.fillRect(0, 0, WIDTH, HEIGHT);
        
        bgCtx.fillStyle = currentBiome.sun;
        bgCtx.beginPath();
        let sunX = 800 + Math.sin(level) * 200; 
        let sunY = 150 + Math.cos(level) * 50;
        bgCtx.arc(sunX, sunY, 70, 0, Math.PI*2);
        bgCtx.fill();
        
        drawMountains(bgCtx, currentBiome.mountains[0], level * 10, 250, 150);
        drawMountains(bgCtx, currentBiome.mountains[1], level * 20, 120, 100);
    }

    function drawMountains(context, color, seed, baseHeight, amplitude) {
        context.fillStyle = color;
        context.beginPath();
        context.moveTo(0, HEIGHT);
        for(let x = 0; x <= WIDTH; x += 30) {
            let y = HEIGHT - baseHeight - Math.sin(x*0.008 + seed)*amplitude - Math.sin(x*0.03 + seed*2)*(amplitude*0.3);
            context.lineTo(x, y);
        }
        context.lineTo(WIDTH, HEIGHT);
        context.fill();
    }

    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    canvas.addEventListener('touchstart', startDrag, { passive: false });
    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('touchmove', moveDrag, { passive: false });
    canvas.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchend', endDrag);
    window.addEventListener('mouseup', endDrag);

    function startDrag(e) {
        if (gameState !== 'playing' || !sling || !sling.bodyB || !projectile) return;
        initAudio(); 
        const pos = getCanvasPos(e);
        if (pos.x < WIDTH / 2) { 
            if (e.type === 'touchstart') e.preventDefault();
            isCatapultDragging = true;
            dragPosition = pos;
        }
    }

    function moveDrag(e) {
        if (isCatapultDragging) {
            e.preventDefault();
            dragPosition = getCanvasPos(e);
        }
    }

    function endDrag(e) {
        if (isCatapultDragging) {
            isCatapultDragging = false;
            if (!projectile) return;

            const dist = Vector.magnitude(Vector.sub(projectile.position, anchor));
            if (dist > 30 && ammo[currentWeapon] > 0) {
                
                sling.bodyB = null;
                World.remove(world, sling);
                Sleeping.set(projectile, false);
                
                isFired = true;
                currentPath = [];
                trackingProjectile = projectile; 
                
                let firedProj = projectile;
                firedProjectiles.push(firedProj);
                projectile = null; 
                
                ammo[currentWeapon]--;
                updateAmmoUI();

                setTimeout(() => { if (firedProj) firedProj.collisionFilter.group = 0; }, 100);
                
                if (endTimer) { clearTimeout(endTimer); endTimer = null; }
                
                if (blocksDestroyed / totalBlocksStart < currentGoalPercentage) {
                     checkAmmoStatus();
                }
                
                if (ammo.pedra > 0 || ammo.ferro > 0 || ammo.bomba > 0) {
                    createProjTimer = setTimeout(createProjectile, 1500); 
                }
            }
        }
    }

    Events.on(engine, 'beforeUpdate', () => {
        firedProjectiles.forEach(p => {
            const MAX_SPEED = 26; 
            if (p.speed > MAX_SPEED) {
                Body.setVelocity(p, Vector.mult(Vector.normalise(p.velocity), MAX_SPEED));
            }
        });

        if (isCatapultDragging && projectile && sling && sling.bodyB) {
            let dragVec = Vector.sub(dragPosition, anchor);
            if (Vector.magnitude(dragVec) > MAX_DRAG) {
                dragVec = Vector.mult(Vector.normalise(dragVec), MAX_DRAG);
            }
            
            let targetPos = Vector.add(anchor, dragVec);
            const weaponRadius = WEAPONS[currentWeapon].radius;
            
            if (targetPos.y > GROUND_Y - weaponRadius) targetPos.y = GROUND_Y - weaponRadius;
            if (targetPos.x < weaponRadius) targetPos.x = weaponRadius;

            Body.setPosition(projectile, targetPos);
            Body.setVelocity(projectile, { x: 0, y: 0 });
        }
    });

    Events.on(engine, 'afterUpdate', () => {
        if (isFired && trackingProjectile && trackingProjectile.speed > 2 && trackingProjectile.position.y < GROUND_Y) {
            frameCount++;
            if (frameCount % 4 === 0) {
                currentPath.push({ x: trackingProjectile.position.x, y: trackingProjectile.position.y });
                if (currentPath.length > 100) currentPath.shift();
            }
        }

        // Limpeza Munições
        for (let i = firedProjectiles.length - 1; i >= 0; i--) {
            let p = firedProjectiles[i];
            if (p.label === 'bomba') continue; 

            let outOfBounds = p.position.y > HEIGHT + 100 || p.position.x < -100 || p.position.x > WIDTH + 100;
            if (outOfBounds) {
                World.remove(world, p);
                firedProjectiles.splice(i, 1);
                continue;
            }

            if (p.speed < 0.5) {
                p.sinkTimer = (p.sinkTimer || 0) + 1;
                if (p.sinkTimer > 90) { 
                    p.collisionFilter.mask = 0; 
                    p.renderScale = (p.renderScale !== undefined ? p.renderScale : 1) - 0.03;
                    
                    if (p.renderScale <= 0) {
                        World.remove(world, p);
                        firedProjectiles.splice(i, 1);
                    }
                }
            } else {
                p.sinkTimer = 0; 
            }
        }

        let newDestructions = 0;
        for (let i = castleBlocks.length - 1; i >= 0; i--) {
            const block = castleBlocks[i];
            
            // OTIMIZAÇÃO: Culling de Vaporização
            if (block.isVaporized) {
                if (!block.customDestroyed) { block.customDestroyed = true; newDestructions++; }
                World.remove(world, block);
                castleBlocks.splice(i, 1);
                continue;
            }

            let outOfBounds = block.position.y > HEIGHT + 100 || block.position.x < -100 || block.position.x > WIDTH + 100;
            if (outOfBounds) {
                if (!block.customDestroyed) { block.customDestroyed = true; newDestructions++; }
                World.remove(world, block);
                castleBlocks.splice(i, 1);
                continue;
            }

            if (block.isSleeping && !block.customDestroyed) continue;

            if (!block.customDestroyed) {
                let dx = Math.abs(block.position.x - block.initialX);
                let tilt = Math.abs(block.angle);

                let tumbled = tilt > 0.8; 
                let blownAway = dx > currentBlockSize * 5;
                let fellToGround = (block.position.y > GROUND_Y - currentBlockSize * 4) && (block.initialY < GROUND_Y - currentBlockSize * 12);

                if (tumbled || blownAway || fellToGround) {
                    block.customDestroyed = true;
                    // OTIMIZAÇÃO (Fantasmas): Os destroços não batem mais entre si
                    block.collisionFilter.category = CAT_DEBRIS;
                    block.collisionFilter.mask = CAT_DEFAULT | CAT_INTACT; 
                    newDestructions++;
                }
            }

            if (block.customDestroyed) {
                if (block.position.y > GROUND_Y - currentBlockSize * 5 && block.speed < 1.5) {
                    block.sinkTimer = (block.sinkTimer || 0) + 1;
                    let maxWait = Math.max(10, 50 - Math.floor(currentLevel * 0.4));
                    
                    if (block.sinkTimer > maxWait) {
                        block.collisionFilter.mask = 0; 
                        block.renderScale = (block.renderScale !== undefined ? block.renderScale : 1) - 0.08;
                        
                        if (block.renderScale <= 0) {
                            block.isVaporized = true;
                        }
                    }
                } else {
                    block.sinkTimer = 0; 
                }
            }
        }

        if (newDestructions > 0) {
            blocksDestroyed += newDestructions;
            updateProgress();
            playDebrisSound(newDestructions);
            
            if (blocksDestroyed / totalBlocksStart >= currentGoalPercentage && gameState === 'playing') {
                if (endTimer) { clearTimeout(endTimer); endTimer = null; }
                if (winTimer) { clearTimeout(winTimer); winTimer = null; }
                gameState = 'waiting_result'; 
                winTimer = setTimeout(evaluateEndGame, 1000); 
            }
        }
    });

    function setWeapon(type) {
        if (ammo[type] <= 0 || gameState !== 'playing') return; 
        currentWeapon = type;
        document.querySelectorAll('.btn-weapon').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        
        if (sling && sling.bodyB && projectile) {
            World.remove(world, projectile);
            createProjectile();
        }
    }

    function createProjectile() {
        if (gameState !== 'playing') return;
        
        if (isFired && currentPath.length > 5) lastPath = [...currentPath];
        isFired = false;
        trackingProjectile = null; 
        
        if (ammo[currentWeapon] <= 0) {
            if (ammo['pedra'] > 0) currentWeapon = 'pedra';
            else if (ammo['ferro'] > 0 && currentLevel >= 20) currentWeapon = 'ferro';
            else if (ammo['bomba'] > 0 && currentLevel >= 70) currentWeapon = 'bomba';
            else return; 
            
            document.querySelectorAll('.btn-weapon').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${currentWeapon}`).classList.add('active');
        }

        const props = WEAPONS[currentWeapon];
        const opts = {
            density: props.density, restitution: props.restitution, friction: 0.8, frictionAir: 0.002,
            label: currentWeapon === 'bomba' ? 'bomba' : 'projétil', 
            collisionFilter: { category: CAT_DEFAULT, mask: CAT_DEFAULT | CAT_INTACT | CAT_DEBRIS }, 
            render: { fillStyle: props.color },
            hasImpacted: false,
            renderScale: 1
        };

        projectile = props.type === 'rect' 
            ? Bodies.rectangle(anchor.x, anchor.y, props.radius * 2, props.radius * 2, { ...opts, chamfer: { radius: 3 } })
            : Bodies.circle(anchor.x, anchor.y, props.radius, opts);

        sling = Constraint.create({ pointA: anchor, bodyB: projectile, stiffness: 0.022, damping: 0.1, length: 5, render: { visible: false } });
        World.add(world, [projectile, sling]);
    }

    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach((pair) => {
            if (pair.bodyA.label === 'bomba' && !pair.bodyA.triggered) triggerBomb(pair.bodyA);
            else if (pair.bodyB.label === 'bomba' && !pair.bodyB.triggered) triggerBomb(pair.bodyB);
            
            let proj = null;
            let block = null;

            if (pair.bodyA.label === 'projétil' && pair.bodyB.label === 'castleBlock') { proj = pair.bodyA; block = pair.bodyB; }
            else if (pair.bodyB.label === 'projétil' && pair.bodyA.label === 'castleBlock') { proj = pair.bodyB; block = pair.bodyA; }

            if (proj && block) {
                Sleeping.set(block, false); 
                
                if (!proj.hasImpacted && proj.speed > 5) {
                    playImpactSound(proj.speed);
                    proj.hasImpacted = true;
                    let type = (proj.circleRadius > 14) ? 'ferro' : 'pedra';
                    createKineticShockwave(proj.position.x, proj.position.y, type);
                }
            }
        });
    });

    function createKineticShockwave(x, y, type) {
        const isFerro = type === 'ferro';
        const radius = isFerro ? 110 : 70;
        // SUPER CASCATA: Raio de vaporização central aumentado (absorve pedaços destruídos de imediato)
        const coreRadius = isFerro ? 35 : 18; 
        const force = isFerro ? 0.08 : 0.04;
        
        // Efeito visual mais poeirento e persistente
        shockwaves.push({ x: x, y: y, radius: 0, maxRadius: radius, alpha: 0.8 });

        castleBlocks.forEach(b => {
            if (b.isStatic || b.collisionFilter.mask === 0 || b.isVaporized) return;
            let dx = b.position.x - x;
            let dy = b.position.y - y;
            if (Math.abs(dx) > radius || Math.abs(dy) > radius) return; 

            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < coreRadius) {
                b.isVaporized = true; 
            } else if (dist < radius) {
                Sleeping.set(b, false); 
                const forceDir = { x: dx/dist, y: dy/dist }; 
                const magnitude = force * (1 - dist / radius) * b.mass; 
                Body.applyForce(b, b.position, { x: forceDir.x * magnitude, y: forceDir.y * magnitude });
            }
        });
    }

    function triggerBomb(bombBody) {
        bombBody.triggered = true;
        playExplosionSound();
        setTimeout(() => {
            if (!Composite.allBodies(world).includes(bombBody)) return; 
            
            const radius = 130; 
            const coreRadius = 45; 
            const force = 0.25; 
            const bx = bombBody.position.x, by = bombBody.position.y;
            explosions.push({ x: bx, y: by, radius: 0, maxRadius: radius });

            castleBlocks.forEach(b => {
                if (b.isStatic || b.collisionFilter.mask === 0 || b.isVaporized) return;
                let dx = b.position.x - bx;
                let dy = b.position.y - by;
                if (Math.abs(dx) > radius || Math.abs(dy) > radius) return;

                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < coreRadius) {
                    b.isVaporized = true; 
                } else if (dist < radius) {
                    Sleeping.set(b, false); 
                    const forceDir = { x: dx/dist, y: dy/dist };
                    const magnitude = force * (1 - dist / radius) * b.mass; 
                    Body.applyForce(b, b.position, { x: forceDir.x * magnitude, y: forceDir.y * magnitude });
                }
            });
            World.remove(world, bombBody);
            firedProjectiles = firedProjectiles.filter(p => p !== bombBody);
        }, 800); 
    }

    function generateLevelBlueprint(level) {
        let cols = Math.min(25 + Math.floor(level * 0.55), 75);
        let rows = Math.min(25 + Math.floor(level * 0.4), 48);

        let grid = Array(rows).fill(null).map(() => Array(cols).fill(' '));

        function fillRect(x, y, w, h, material) {
            for(let r=y; r<y+h; r++) {
                for(let c=x; c<x+w; c++) {
                    if(r>=0 && r<rows && c>=0 && c<cols) grid[r][c] = material;
                }
            }
        }

        let wallHeight = 10 + Math.floor(level / 8);
        fillRect(0, 0, cols, wallHeight, 'S');
        for(let c=0; c<cols; c++) {
            if(c%4 < 2) { 
                if (wallHeight < rows) grid[wallHeight][c] = 'S';
            }
            grid[0][c] = 'D'; 
        }

        let numTowers = 1 + Math.floor(level / 12);
        let towerWidth = 10 + Math.floor(level / 30);
        if (towerWidth % 2 !== 0) towerWidth++; 
        
        let spacing = Math.floor(cols / (numTowers + 1));
        
        for (let i = 1; i <= numTowers; i++) {
            let tx = (i * spacing) - Math.floor(towerWidth/2);
            let th = wallHeight + 12 + Math.floor(level/4) + (i % 2 === 0 ? 6 : 0);
            if (th > rows - 12) th = rows - 12;
            
            fillRect(tx, 0, towerWidth, th, 'S');
            
            for (let r=0; r<th; r++) {
                if (r<rows && tx>=0 && tx<cols) grid[r][tx] = 'D';
                if (r<rows && tx+towerWidth-1>=0 && tx+towerWidth-1<cols) grid[r][tx+towerWidth-1] = 'D';
            }

            let roofH = Math.floor(towerWidth / 2);
            for (let j=0; j<=roofH; j++) {
                let rw = towerWidth + 2 - (j*2);
                let rx = tx - 1 + j;
                let ry = th + j;
                fillRect(rx, ry, rw, 1, 'R');
            }

            for (let r = 12; r < th - 6; r += 10) {
                fillRect(tx + Math.floor(towerWidth/2) - 1, r, 2, 4, 'G');
            }
        }

        let gateX = Math.floor(cols/2) - 4;
        if (gateX > 0 && gateX + 8 < cols) {
            fillRect(gateX, 0, 8, 8, 'W');
            fillRect(gateX-1, 0, 1, 9, 'D'); 
            fillRect(gateX+8, 0, 1, 9, 'D');
            fillRect(gateX, 8, 8, 1, 'D');
        }

        for(let c=0; c<cols; c++) {
            if(grid[0][c] !== ' ' && Math.random() > 0.4) grid[0][c] = 'M';
            if(grid[1][c] !== ' ' && Math.random() > 0.7) grid[1][c] = 'M';
            if(grid[2][c] !== ' ' && Math.random() > 0.9) grid[2][c] = 'M';
        }

        grid.reverse(); 
        return grid.map(row => row.join(''));
    }

    function buildCastleFromBlueprint(blueprint, startX, startY) {
        const rows = blueprint.length;
        const cols = blueprint[0].length;
        const gridHeight = rows * currentBlockSize;
        const adjustedStartY = startY - gridHeight;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const type = blueprint[r][c];
                if (type !== ' ') {
                    const x = startX + (c * currentBlockSize) + (currentBlockSize / 2);
                    const y = adjustedStartY + (r * currentBlockSize) + (currentBlockSize / 2);
                    
                    const colors = PALETTE[type];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    let density = 0.045; 
                    
                    const block = Bodies.rectangle(x, y, currentBlockSize, currentBlockSize, {
                        density: density,
                        friction: 0.9, 
                        frictionStatic: 20, 
                        restitution: 0.0, 
                        isSleeping: true, 
                        label: 'castleBlock',
                        collisionFilter: { category: CAT_INTACT, mask: CAT_DEFAULT | CAT_INTACT | CAT_DEBRIS },
                        render: { fillStyle: color },
                        initialX: x, 
                        initialY: y,
                        customDestroyed: false,
                        sinkTimer: 0,
                        renderScale: 1,
                        isVaporized: false
                    });
                    
                    castleBlocks.push(block);
                    World.add(world, block);
                }
            }
        }
        totalBlocksStart = castleBlocks.length;
        blocksDestroyed = 0;
        updateProgress();
    }

    function setupDifficultyAndAmmo(level) {
        currentGoalPercentage = 0.35 + (0.45 * (level / 100));
        let total = 7 + Math.floor(level / 4); 
        
        ammo.ferro = 0;
        ammo.bomba = 0;
        
        if (level >= 70) { ammo.bomba = 1; if (level >= 95) ammo.bomba = 2; total -= ammo.bomba; }
        if (level >= 20) { ammo.ferro = 1 + Math.floor((level - 20) / 8); total -= ammo.ferro; }

        ammo.pedra = Math.max(1, total); 
        
        updateAmmoUI();
        currentWeapon = ammo.pedra > 0 ? 'pedra' : (ammo.ferro > 0 ? 'ferro' : 'bomba');
        document.querySelectorAll('.btn-weapon').forEach(btn => btn.classList.remove('active'));
        if (document.getElementById(`btn-${currentWeapon}`)) {
            document.getElementById(`btn-${currentWeapon}`).classList.add('active');
        }
    }

    function updateAmmoUI() {
        ['pedra', 'ferro', 'bomba'].forEach(w => {
            const btn = document.getElementById(`btn-${w}`);
            const badge = document.getElementById(`ammo-${w}`);
            
            if (w === 'ferro' && currentLevel < 20) {
                badge.innerText = "🔒"; badge.style.background = "#4b5563";
                btn.disabled = true; btn.classList.remove('active');
            }
            else if (w === 'bomba' && currentLevel < 70) {
                badge.innerText = "🔒"; badge.style.background = "#4b5563";
                btn.disabled = true; btn.classList.remove('active');
            } else {
                badge.innerText = ammo[w]; badge.style.background = "#ef4444";
                if (ammo[w] <= 0) { btn.disabled = true; btn.classList.remove('active'); } 
                else { btn.disabled = false; }
            }
        });
    }

    function checkAmmoStatus() {
        if (gameState !== 'playing') return;
        if (ammo.pedra === 0 && ammo.ferro === 0 && ammo.bomba === 0) {
            gameState = 'waiting_result';
            endTimer = setTimeout(evaluateEndGame, 6000);
        }
    }

    function loadLevel(lvl) {
        gameState = 'playing';
        if (endTimer) { clearTimeout(endTimer); endTimer = null; }
        if (winTimer) { clearTimeout(winTimer); winTimer = null; }
        if (createProjTimer) { clearTimeout(createProjTimer); createProjTimer = null; }
        
        document.getElementById('level-display').innerText = lvl;
        preRenderBackground(lvl);
        
        currentBlockSize = lvl >= 80 ? 9 : (lvl >= 45 ? 8 : 7);
        
        lastPath = [];
        currentPath = [];
        shockwaves = []; 
        trackingProjectile = null;
        
        castleBlocks.forEach(b => World.remove(world, b));
        castleBlocks = [];
        firedProjectiles.forEach(p => World.remove(world, p));
        firedProjectiles = [];
        explosions = [];
        
        if(sling) World.remove(world, sling);
        if(projectile) { World.remove(world, projectile); projectile = null; }

        if (!ground) {
            ground = Bodies.rectangle(WIDTH/2, HEIGHT - 20, WIDTH * 2, 40, { 
                isStatic: true, label: 'ground', friction: 1,
                collisionFilter: { category: CAT_DEFAULT, mask: CAT_DEFAULT | CAT_INTACT | CAT_DEBRIS }
            });
            World.add(world, [ground]);
        }

        setupDifficultyAndAmmo(lvl);
        const blueprint = generateLevelBlueprint(lvl);
        const castleWidth = blueprint[0].length * currentBlockSize;
        const startX = Math.max(450, WIDTH - castleWidth - 60); 

        buildCastleFromBlueprint(blueprint, startX, GROUND_Y);
        createProjectile();
    }

    function updateProgress() {
        if (totalBlocksStart === 0) return;
        const percentage = blocksDestroyed / totalBlocksStart;
        const percentageInt = Math.min(100, Math.floor(percentage * 100));
        const goalInt = Math.floor(currentGoalPercentage * 100);
        
        document.getElementById('progress-bar').style.width = `${percentageInt}%`;
        document.getElementById('progress-text-value').innerHTML = `${percentageInt}% <span class="text-white/70 font-normal">/ ${goalInt}%</span>`;

        if (percentage >= currentGoalPercentage) {
            document.getElementById('progress-bar').style.backgroundColor = '#facc15'; 
            document.getElementById('progress-bar').style.boxShadow = '0 0 8px rgba(250, 204, 21, 0.8)';
        } else {
            document.getElementById('progress-bar').style.backgroundColor = '#ef4444'; 
            document.getElementById('progress-bar').style.boxShadow = '0 0 8px rgba(239, 68, 68, 0.8)';
        }
    }

    function evaluateEndGame() {
        if (gameState !== 'waiting_result') return; 
        gameState = 'ended';
        
        const percentage = blocksDestroyed / totalBlocksStart;
        const modal = document.getElementById('message-screen');
        modal.classList.remove('hidden');

        if (percentage >= currentGoalPercentage) {
            if (currentLevel === maxLevels) {
                document.getElementById('msg-title').innerText = "CONQUISTA TOTAL!";
                document.getElementById('msg-title').className = "text-5xl font-bold text-yellow-400 mb-3 tracking-tight drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]";
                document.getElementById('msg-desc').innerText = "Venceste os 100 castelos épicos!";
                document.getElementById('msg-btn').innerText = "REINICIAR CAMPANHA";
                document.getElementById('msg-btn').onclick = () => { currentLevel = 1; retryLevel(); };
            } else {
                document.getElementById('msg-title').innerText = "VITÓRIA!";
                document.getElementById('msg-title').className = "text-4xl font-bold text-green-400 mb-3 tracking-tight drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]";
                document.getElementById('msg-desc').innerText = "A fortaleza ruiu perante o teu ataque.";
                document.getElementById('msg-btn').innerText = "PRÓXIMO NÍVEL";
                document.getElementById('msg-btn').onclick = nextLevel;
            }
        } else {
            document.getElementById('msg-title').innerText = "DERROTA!";
            document.getElementById('msg-title').className = "text-4xl font-bold text-red-500 mb-3 tracking-tight drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]";
            document.getElementById('msg-desc').innerText = `Faltou munição! (${Math.floor(percentage*100)}% de ${Math.floor(currentGoalPercentage*100)}% exigido)`;
            document.getElementById('msg-btn').innerText = "TENTAR NOVAMENTE";
            document.getElementById('msg-btn').onclick = retryLevel;
        }
    }

    function retryLevel() {
        document.getElementById('message-screen').classList.add('hidden');
        loadLevel(currentLevel);
    }
    
    function nextLevel() {
        document.getElementById('message-screen').classList.add('hidden');
        currentLevel++;
        loadLevel(currentLevel);
    }
    
    function handleEndScreenBtn() {
        document.getElementById('msg-btn').onclick();
    }

    function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.drawImage(bgCanvas, 0, 0);

        ctx.fillStyle = currentBiome.ground; 
        ctx.fillRect(0, HEIGHT - 40, WIDTH, 40);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, HEIGHT - 40); ctx.lineTo(WIDTH, HEIGHT - 40); ctx.stroke();

        ctx.fillStyle = '#2c1e16';
        ctx.fillRect(anchor.x - 20, anchor.y + 20, 40, 160);
        ctx.strokeRect(anchor.x - 20, anchor.y + 20, 40, 160);

        if (lastPath.length > 1) {
            ctx.beginPath();
            ctx.setLineDash([4, 6]); 
            ctx.moveTo(lastPath[0].x, lastPath[0].y);
            for(let i = 1; i < lastPath.length; i++) {
                ctx.lineTo(lastPath[i].x, lastPath[i].y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]); 
        }

        if (sling && sling.bodyB && gameState === 'playing' && projectile) {
            ctx.beginPath(); ctx.moveTo(anchor.x - 10, anchor.y); ctx.lineTo(projectile.position.x, projectile.position.y);
            ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.stroke();
        }

        for (let i = 0; i < castleBlocks.length; i++) {
            const body = castleBlocks[i];
            let renderScale = body.renderScale || 1;
            let currentSize = currentBlockSize * renderScale;
            let s = currentSize / 2;

            ctx.fillStyle = body.render.fillStyle;

            let alpha = 1.0;
            if (body.collisionFilter.mask === 0) {
                alpha = Math.max(0, renderScale);
            }

            if (Math.abs(body.angle) < 0.01) {
                if (alpha < 1.0) ctx.globalAlpha = alpha;
                ctx.fillRect(body.position.x - s + 0.5, body.position.y - s + 0.5, currentSize - 1, currentSize - 1);
                if (alpha < 1.0) ctx.globalAlpha = 1.0;
            } 
            else {
                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                if (alpha < 1.0) ctx.globalAlpha = alpha;
                ctx.fillRect(-s + 0.5, -s + 0.5, currentSize - 1, currentSize - 1);
                ctx.restore();
            }
        }

        const drawProjectile = (p) => {
            if(!p) return;
            ctx.save();
            ctx.translate(p.position.x, p.position.y);
            if (p.angle !== 0) ctx.rotate(p.angle);
            
            let renderScale = p.renderScale !== undefined ? p.renderScale : 1;
            const r = (p.circleRadius || 12) * renderScale;
            
            if (p.collisionFilter && p.collisionFilter.mask === 0) {
                ctx.globalAlpha = Math.max(0, renderScale);
            }

            ctx.fillStyle = p.render.fillStyle;
            
            if (p.circleRadius !== undefined) { 
                ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#111'; ctx.lineWidth = 2 * renderScale; ctx.stroke();
            } else {
                ctx.fillRect(-r, -r, r*2, r*2);
                ctx.strokeStyle = '#111'; ctx.lineWidth = 2 * renderScale; ctx.strokeRect(-r, -r, r*2, r*2);
            }

            if (p.label === 'bomba') {
                ctx.fillStyle = '#111'; ctx.fillRect(-2 * renderScale, -r - 4 * renderScale, 4 * renderScale, 4 * renderScale);
                if (p.triggered && Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.fillStyle = '#facc15'; ctx.fillRect(-4 * renderScale, -r - 8 * renderScale, 8 * renderScale, 8 * renderScale);
                }
            }
            ctx.restore();
        };

        if (projectile) drawProjectile(projectile);
        firedProjectiles.forEach(drawProjectile);

        if (sling && sling.bodyB && gameState === 'playing' && projectile) {
            ctx.beginPath(); ctx.moveTo(anchor.x + 10, anchor.y); ctx.lineTo(projectile.position.x, projectile.position.y);
            ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.stroke();
            ctx.fillStyle = '#2c1e16';
            ctx.fillRect(projectile.position.x - 8, projectile.position.y - 10, 16, 20);
        }

        if (isCatapultDragging && projectile && sling && sling.bodyB) {
            let dragVec = Vector.sub(dragPosition, anchor);
            let dist = Math.min(Vector.magnitude(dragVec), MAX_DRAG);
            let percent = dist / MAX_DRAG;

            const barW = 60;
            const barH = 4; 
            const barX = anchor.x - barW / 2;
            const barY = anchor.y - 35;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath();
            if(ctx.roundRect) ctx.roundRect(barX, barY, barW, barH, 2); else ctx.rect(barX, barY, barW, barH);
            ctx.fill();

            ctx.fillStyle = `hsl(${120 - (percent * 120)}, 100%, 60%)`;
            ctx.beginPath();
            if(ctx.roundRect) ctx.roundRect(barX, barY, barW * percent, barH, 2); else ctx.rect(barX, barY, barW * percent, barH);
            ctx.fill();
        }

        // DESENHO: Efeito de Poeira/Onda visualmente denso
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            let sw = shockwaves[i];
            sw.radius += 12;
            sw.alpha -= 0.08;
            
            if (sw.alpha > 0) {
                const size = sw.radius * 0.4;
                ctx.fillStyle = `rgba(180, 180, 180, ${sw.alpha})`;
                ctx.fillRect(sw.x - size/2, sw.y - size/2, size, size);
                ctx.fillStyle = `rgba(150, 150, 150, ${sw.alpha * 0.7})`;
                ctx.fillRect(sw.x - size*0.8, sw.y - size*0.3, size, size);
            } else {
                shockwaves.splice(i, 1);
            }
        }

        for (let i = explosions.length - 1; i >= 0; i--) {
            let exp = explosions[i];
            exp.radius += 30;
            
            const size = exp.radius;
            ctx.fillStyle = `rgba(239, 68, 68, ${1 - (exp.radius / exp.maxRadius)})`;
            ctx.fillRect(exp.x - size/2, exp.y - size/2, size, size);
            
            ctx.fillStyle = `rgba(250, 204, 21, ${1 - (exp.radius / exp.maxRadius)})`;
            ctx.fillRect(exp.x - size/3, exp.y - size/3, size/1.5, size/1.5);

            if (exp.radius >= exp.maxRadius) explosions.splice(i, 1);
        }

        requestAnimationFrame(render);
    }

    loadLevel(1);
    render();
</script>
